<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disqualification as Close - LinkedIn Graphic</title>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        svg { background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: block; }
        h2 { margin: 20px 0 10px; color: #333; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Thursday - thestrategypitch.com (1200x628)</h2>
        <svg viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg" width="1200" height="628">
            <!-- Background -->
            <rect width="1200" height="628" fill="#ffffff"/>
            <rect width="1200" height="8" fill="#0A66C2"/>

            <!-- Funnel visual - inverted -->
            <g id="funnel">
                <!-- Normal funnel (most salespeople) -->
                <text x="250" y="120" font-size="16" font-weight="bold" fill="#999">Traditional Funnel:</text>
                <polygon points="150,140 350,140 330,250 170,250" fill="#ccc" opacity="0.3"/>
                <line x1="150" y1="140" x2="350" y2="140" stroke="#999" stroke-width="2"/>
                <line x1="330" y1="250" x2="170" y2="250" stroke="#999" stroke-width="2"/>
                <text x="250" y="200" font-size="12" fill="#999" text-anchor="middle">Lots of prospects</text>
                <text x="250" y="215" font-size="12" fill="#999" text-anchor="middle">Few close</text>

                <!-- Inverted funnel (high performers) -->
                <text x="950" y="120" font-size="16" font-weight="bold" fill="#0A66C2">Better Approach:</text>
                <polygon points="1050,140 850,140 870,250 1030,250" fill="#0A66C2" opacity="0.2"/>
                <line x1="1050" y1="140" x2="850" y2="140" stroke="#0A66C2" stroke-width="2"/>
                <line x1="870" y1="250" x2="1030" y2="250" stroke="#0A66C2" stroke-width="2"/>
                <text x="950" y="200" font-size="12" fill="#0A66C2" text-anchor="middle">Filter aggressively</text>
                <text x="950" y="215" font-size="12" fill="#0A66C2" text-anchor="middle">Higher conversion</text>
            </g>

            <!-- Main message -->
            <text x="600" y="350" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">
                <tspan x="600" dy="0">The highest-converting close</tspan>
                <tspan x="600" dy="50">wasn't a close at all.</tspan>
                <tspan x="600" dy="50" fill="#0A66C2">It was a disqualification.</tspan>
            </text>

            <!-- Key insight box -->
            <rect x="300" y="460" width="600" height="100" fill="#F3F6FB" stroke="#0A66C2" stroke-width="2" rx="6"/>
            <text x="320" y="490" font-size="16" font-weight="bold" fill="#0A66C2">"I'm not sure we're the right fit."</text>
            <text x="320" y="515" font-size="14" fill="#1a1a1a">When you genuinely mean it, buyers fight to prove you wrong.</text>
            <text x="320" y="540" font-size="14" fill="#1a1a1a">Real willingness to walk away flips the power dynamic.</text>

            <!-- CTA -->
            <text x="600" y="600" font-size="14" fill="#0A66C2" font-weight="bold" text-anchor="middle">DM me "FILTER" → Let's pressure-test your closing approach</text>

            <!-- Website footer -->
            <text x="600" y="620" font-size="12" fill="#999" text-anchor="middle">thestrategypitch.com/closing-audit</text>
        </svg>
    </div>
</body>
</html>
