<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Barnes Lam — Apr 21 Graphic</title>
  <style>
    body { margin: 0; padding: 20px; background: #111; font-family: system-ui, sans-serif; }
    svg { display: block; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .controls { margin-top: 16px; display: flex; gap: 12px; }
    button { background: #c9a84c; color: #0d0f1a; border: none; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <svg id="graphic" viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg" width="1200" height="628">
    <!-- Background -->
    <rect width="1200" height="628" fill="#0d0f1a"/>
    <!-- Gold top bar -->
    <rect width="1200" height="6" fill="#c9a84c"/>
    <!-- Subtle grid texture -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <rect width="1200" height="628" fill="url(#grid)"/>
    <!-- Left accent block -->
    <rect x="0" y="0" width="5" height="628" fill="#c9a84c"/>
    <!-- Large background word -->
    <text x="60" y="520" font-size="300" font-weight="900" fill="#ffffff" opacity="0.03" font-family="Georgia, serif">POS</text>
    <!-- Category tag -->
    <rect x="60" y="80" width="180" height="32" rx="4" fill="#c9a84c" opacity="0.15"/>
    <text x="72" y="101" font-size="13" font-weight="700" fill="#c9a84c" font-family="system-ui, sans-serif" letter-spacing="2">AUTHORITY</text>
    <!-- Main headline -->
    <text x="60" y="200" font-size="68" font-weight="900" fill="#ffffff" font-family="Georgia, serif">The market does not</text>
    <text x="60" y="285" font-size="68" font-weight="900" fill="#ffffff" font-family="Georgia, serif">reward <tspan fill="#c9a84c">execution.</tspan></text>
    <text x="60" y="380" font-size="54" font-weight="700" fill="#e0e0e0" font-family="Georgia, serif">It rewards positioning.</text>
    <!-- Divider -->
    <line x1="60" y1="420" x2="500" y2="420" stroke="#c9a84c" stroke-width="2" opacity="0.5"/>
    <!-- Sub-text -->
    <text x="60" y="460" font-size="22" fill="#9a9aaa" font-family="system-ui, sans-serif">For founders &amp; operators at $5M–$50M revenue</text>
    <!-- URL -->
    <text x="60" y="580" font-size="18" fill="#c9a84c" font-family="system-ui, sans-serif" font-weight="600">barneslam.co/positioning-vs-execution</text>
    <!-- Right decorative element -->
    <circle cx="980" cy="314" r="220" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.12"/>
    <circle cx="980" cy="314" r="160" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.08"/>
    <circle cx="980" cy="314" r="100" fill="#c9a84c" opacity="0.04"/>
    <text x="980" y="300" font-size="80" text-anchor="middle" fill="#c9a84c" opacity="0.25">BL</text>
    <text x="980" y="360" font-size="14" text-anchor="middle" fill="#c9a84c" opacity="0.4" font-family="system-ui" letter-spacing="3">BARNES LAM</text>
  </svg>
  <div class="controls">
    <button onclick="downloadSVG()">⬇ Download SVG</button>
  </div>
  <script>
    function downloadSVG() {
      const svg = document.getElementById('graphic');
      const blob = new Blob([svg.outerHTML], {type: 'image/svg+xml'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'barneslam-apr21-positioning.svg'; a.click();
    }
  </script>
</body>
</html>
