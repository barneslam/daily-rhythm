<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTM Handoff Graphic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
    }
    .graphic {
      width: 1200px;
      height: 628px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .graphic::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="1200" height="628" fill="url(%23grid)"/></svg>');
      opacity: 0.3;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
      max-width: 900px;
    }
    .headline {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 30px;
      letter-spacing: -0.5px;
    }
    .subheadline {
      font-size: 24px;
      font-weight: 400;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 40px;
    }
    .cta {
      font-size: 16px;
      font-weight: 600;
      color: #4a9eff;
      letter-spacing: 0.5px;
    }
    .branding {
      position: absolute;
      bottom: 30px;
      left: 40px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .accent {
      position: absolute;
      width: 4px;
      height: 80px;
      background: linear-gradient(180deg, #4a9eff 0%, #0066cc 100%);
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
    }
  </style>
</head>
<body>
  <div class="graphic">
    <div class="accent"></div>
    <div class="content">
      <div class="headline">Most GTM strategies fail in the handoff, not the boardroom</div>
      <div class="subheadline">The translation layer between planning and daily execution is where most mid-market companies stumble</div>
      <div class="cta">→ Learn how to close the gap</div>
    </div>
    <div class="branding">BARNES LAM</div>
  </div>
</body>
</html>
