<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 1 Wrap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
    .carousel { width: 1080px; height: 1350px; background: linear-gradient(135deg, #1a1a33 0%, #333366 100%); display: flex; align-items: center; justify-content: center; color: white; position: relative; overflow: hidden; }
    .slide { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px; }
    h1 { font-size: 72px; font-weight: 700; margin-bottom: 40px; }
    p { font-size: 36px; line-height: 1.5; margin-bottom: 20px; }
    .accent { color: #66ccff; font-weight: 700; }
    .footer { position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; font-size: 24px; }
  </style>
</head>
<body>
  <div class="carousel">
    <div class="slide" style="display: flex;">
      <h1>Week 1 <span class="accent">Wrap</span></h1>
      <p><span class="accent">Execution</span> > Hiring</p>
      <p><span class="accent">Rhythm</span> > Heroics</p>
      <p><span class="accent">Clarity</span> > Luck</p>
      <div class="footer">🚀 See you next week</div>
    </div>
  </div>
</body>
</html>
