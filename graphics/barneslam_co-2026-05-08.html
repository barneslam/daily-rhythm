<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Weekly Rhythm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
    .carousel { width: 1080px; height: 1350px; background: linear-gradient(135deg, #330033 0%, #660066 100%); display: flex; align-items: center; justify-content: center; color: white; position: relative; overflow: hidden; }
    .slide { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px; }
    h1 { font-size: 60px; font-weight: 700; margin-bottom: 40px; }
    .day { font-size: 36px; margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px; }
    .accent { color: #ff66ff; font-weight: 700; }
    .footer { position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; font-size: 24px; }
  </style>
</head>
<body>
  <div class="carousel">
    <div class="slide" style="display: flex;">
      <h1>The Weekly <span class="accent">Rhythm</span></h1>
      <div class="day">Monday: Pipeline Review</div>
      <div class="day">Wednesday: Midweek Pulse</div>
      <div class="day">Friday: Weekly Review</div>
      <div class="footer">📅 3x faster growth</div>
    </div>
  </div>
</body>
</html>
