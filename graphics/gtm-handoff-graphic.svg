<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg)"/>
  <rect width="1200" height="628" fill="url(#grid)"/>

  <!-- Accent bar -->
  <rect x="40" y="274" width="4" height="80" fill="url(#accent)"/>

  <!-- Main headline -->
  <text x="600" y="240" font-size="52" font-weight="700" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" line-height="1.2">
    <tspan x="600" dy="0">Most GTM strategies fail in</tspan>
    <tspan x="600" dy="62">the handoff, not the boardroom</tspan>
  </text>

  <!-- Subheadline -->
  <text x="600" y="370" font-size="24" font-weight="400" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" line-height="1.4">
    <tspan x="600" dy="0">The translation layer between planning and daily</tspan>
    <tspan x="600" dy="32">execution is where most mid-market companies stumble</tspan>
  </text>

  <!-- CTA -->
  <text x="600" y="440" font-size="16" font-weight="600" text-anchor="middle" fill="#4a9eff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" letter-spacing="0.5">
    → Learn how to close the gap
  </text>

  <!-- Branding -->
  <text x="40" y="595" font-size="14" font-weight="500" fill="rgba(255,255,255,0.6)" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" letter-spacing="1">
    BARNES LAM
  </text>
</svg>