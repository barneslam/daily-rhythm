<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue Math</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
    .carousel { width: 1080px; height: 1350px; background: linear-gradient(135deg, #003d33 0%, #008566 100%); display: flex; align-items: center; justify-content: center; color: white; position: relative; overflow: hidden; }
    .slide { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px; }
    h1 { font-size: 68px; font-weight: 700; margin-bottom: 30px; }
    p { font-size: 34px; line-height: 1.5; margin-bottom: 20px; }
    .big-number { font-size: 96px; font-weight: 700; color: #00ff99; margin: 20px 0; }
    .footer { position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; font-size: 24px; }
  </style>
</head>
<body>
  <div class="carousel">
    <div class="slide" style="display: flex;">
      <h1>Revenue <span style="color: #00ff99;">Math</span></h1>
      <div class="big-number">60%</div>
      <p>Pipeline growth from <span style="color: #00ff99; font-weight: 700;">execution</span>, not hiring.</p>
      <div class="footer">📈 The numbers</div>
    </div>
  </div>
</body>
</html>
