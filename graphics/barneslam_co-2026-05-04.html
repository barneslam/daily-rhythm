<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Revenue Execution Gap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
    .carousel { width: 1080px; height: 1350px; background: linear-gradient(135deg, #001a33 0%, #003d66 100%); display: flex; align-items: center; justify-content: center; color: white; position: relative; overflow: hidden; }
    .slide { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px; }
    h1 { font-size: 72px; font-weight: 700; margin-bottom: 30px; line-height: 1.2; }
    p { font-size: 32px; line-height: 1.5; margin-bottom: 20px; }
    .accent { color: #ffd700; font-weight: 600; }
    .footer { position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; font-size: 24px; }
  </style>
</head>
<body>
  <div class="carousel">
    <div class="slide" style="display: flex;">
      <h1>The Revenue <span class="accent">Execution Gap</span></h1>
      <p>Most teams have strategy.</p>
      <p>Few execute it <span class="accent">consistently.</span></p>
      <div class="footer">📊 Swipe for the gap</div>
    </div>
  </div>
</body>
</html>
