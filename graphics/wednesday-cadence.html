<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closing Cadence System - LinkedIn Graphic</title>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        svg { background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: block; }
        h2 { margin: 20px 0 10px; color: #333; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Wednesday - Axis Chamber (1200x628)</h2>
        <svg viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg" width="1200" height="628">
            <!-- Background -->
            <rect width="1200" height="628" fill="#ffffff"/>
            <rect width="1200" height="8" fill="#1B4D3E"/>

            <!-- Timeline visualization -->
            <g id="timeline">
                <!-- Main timeline line -->
                <line x1="100" y1="200" x2="1100" y2="200" stroke="#1B4D3E" stroke-width="3"/>

                <!-- Day 0 -->
                <circle cx="150" cy="200" r="20" fill="#1B4D3E"/>
                <text x="150" y="240" font-size="14" font-weight="bold" fill="#1B4D3E" text-anchor="middle">Day 0</text>
                <text x="150" y="260" font-size="12" fill="#666" text-anchor="middle">Proposal</text>

                <!-- Day 1 -->
                <circle cx="320" cy="200" r="20" fill="#2D6A55"/>
                <text x="320" y="240" font-size="14" font-weight="bold" fill="#1B4D3E" text-anchor="middle">Day 1</text>
                <text x="320" y="260" font-size="12" fill="#666" text-anchor="middle">Video</text>

                <!-- Day 3 -->
                <circle cx="490" cy="200" r="20" fill="#2D6A55"/>
                <text x="490" y="240" font-size="14" font-weight="bold" fill="#1B4D3E" text-anchor="middle">Day 3</text>
                <text x="490" y="260" font-size="12" fill="#666" text-anchor="middle">Case Study</text>

                <!-- Day 5 -->
                <circle cx="660" cy="200" r="20" fill="#2D6A55"/>
                <text x="660" y="240" font-size="14" font-weight="bold" fill="#1B4D3E" text-anchor="middle">Day 5</text>
                <text x="660" y="260" font-size="12" fill="#666" text-anchor="middle">Direct Ask</text>

                <!-- Day 7 -->
                <circle cx="830" cy="200" r="20" fill="#DC3545"/>
                <text x="830" y="240" font-size="14" font-weight="bold" fill="#DC3545" text-anchor="middle">Day 7</text>
                <text x="830" y="260" font-size="12" fill="#666" text-anchor="middle">Breakup</text>
            </g>

            <!-- Main stat -->
            <text x="600" y="360" font-size="56" font-weight="bold" fill="#1B4D3E" text-anchor="middle">
                <tspan x="600" dy="0">45 days → 18 days</tspan>
            </text>
            <text x="600" y="410" font-size="20" fill="#666" text-anchor="middle">One agency owner implemented this cadence.</text>
            <text x="600" y="440" font-size="20" fill="#666" text-anchor="middle">Sales cycle dropped 60%.</text>

            <!-- CTA box -->
            <rect x="400" y="480" width="400" height="100" fill="#F3F8F6" stroke="#1B4D3E" stroke-width="2" rx="6"/>
            <text x="420" y="515" font-size="18" font-weight="bold" fill="#1B4D3E">DM me "CADENCE"</text>
            <text x="420" y="545" font-size="14" fill="#1a1a1a">Get our plug-and-play closing sequence</text>
            <text x="420" y="565" font-size="14" fill="#1a1a1a">template. Remove decision fatigue.</text>

            <!-- Footer -->
            <text x="600" y="600" font-size="14" fill="#666" text-anchor="middle">barneslam.co/closing-cadence</text>
        </svg>
    </div>
</body>
</html>
