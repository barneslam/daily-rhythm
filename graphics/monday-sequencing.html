<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sequencing Problem - LinkedIn Graphic</title>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        svg { background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: block; }
        h2 { margin: 20px 0 10px; color: #333; font-size: 14px; font-weight: 600; }
        p { margin: 0; color: #666; font-size: 12px; }
        .download { margin-top: 20px; }
        button { background: #0A66C2; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background: #084298; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Monday - thestrategypitch.com (1200x628)</h2>
        <svg viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg" width="1200" height="628">
            <!-- Background -->
            <rect width="1200" height="628" fill="#ffffff"/>

            <!-- Accent bar -->
            <rect width="1200" height="8" fill="#0A66C2"/>

            <!-- Left side: Visual -->
            <circle cx="200" cy="314" r="120" fill="#E8F0FE" opacity="0.5"/>
            <circle cx="200" cy="314" r="100" fill="#0A66C2" opacity="0.1"/>

            <!-- Stats comparison -->
            <g id="stat-before">
                <text x="80" y="280" font-size="48" font-weight="bold" fill="#999999">12%</text>
                <text x="80" y="320" font-size="18" fill="#666666">Before</text>
                <line x1="60" y1="340" x2="240" y2="340" stroke="#ddd" stroke-width="2"/>
            </g>

            <!-- Arrow -->
            <path d="M 280 314 L 320 314" stroke="#0A66C2" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <polygon points="0 0, 10 3, 0 6" fill="#0A66C2" />
                </marker>
            </defs>

            <!-- Stats after -->
            <g id="stat-after">
                <text x="380" y="280" font-size="48" font-weight="bold" fill="#0A66C2">23%</text>
                <text x="380" y="320" font-size="18" fill="#0A66C2">After</text>
                <rect x="360" y="330" width="120" height="4" fill="#0A66C2" opacity="0.2"/>
            </g>

            <!-- Main message -->
            <text x="650" y="200" font-size="42" font-weight="bold" fill="#1a1a1a" text-anchor="start">
                <tspan x="650" dy="0">Most founders don't</tspan>
                <tspan x="650" dy="50">have a closing problem.</tspan>
                <tspan x="650" dy="50" fill="#0A66C2">They have a</tspan>
                <tspan x="650" dy="50" fill="#0A66C2">sequencing problem.</tspan>
            </text>

            <!-- CTA -->
            <rect x="650" y="480" width="520" height="80" fill="#F3F6FB" stroke="#0A66C2" stroke-width="2" rx="6"/>
            <text x="670" y="510" font-size="18" font-weight="bold" fill="#0A66C2">DM me "SEQUENCE"</text>
            <text x="670" y="540" font-size="16" fill="#1a1a1a">Get the diagnostic that moved close rates 12% → 23%</text>

            <!-- Website footer -->
            <text x="600" y="600" font-size="14" fill="#666" text-anchor="middle">thestrategypitch.com/closing-sequence</text>
        </svg>

        <div class="download">
            <p><strong>Download tips:</strong> Right-click SVG → Save As PNG, or take screenshot (1200x628px)</p>
            <p><strong>Platform:</strong> LinkedIn, Twitter (adjust to 1024x512 for Twitter)</p>
        </div>
    </div>
</body>
</html>
