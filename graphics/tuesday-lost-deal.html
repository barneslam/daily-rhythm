<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$180K Lost Deal - LinkedIn Graphic</title>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        svg { background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: block; }
        h2 { margin: 20px 0 10px; color: #333; font-size: 14px; font-weight: 600; }
        p { margin: 0; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Tuesday - barneslam.co (1200x628)</h2>
        <svg viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg" width="1200" height="628">
            <!-- Background gradient effect -->
            <defs>
                <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#fff5f5;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
                </linearGradient>
            </defs>
            <rect width="1200" height="628" fill="url(#bgGrad)"/>

            <!-- Red accent bar -->
            <rect width="1200" height="8" fill="#DC3545"/>

            <!-- Large stat - $180K -->
            <circle cx="180" cy="314" r="130" fill="#DC3545" opacity="0.1"/>
            <text x="180" y="340" font-size="96" font-weight="bold" fill="#DC3545" text-anchor="middle">$180K</text>

            <!-- Lost label -->
            <rect x="80" y="390" width="200" height="50" fill="#DC3545" rx="4"/>
            <text x="180" y="420" font-size="20" font-weight="bold" fill="white" text-anchor="middle">LOST DEAL</text>

            <!-- Main headline -->
            <text x="500" y="160" font-size="38" font-weight="bold" fill="#1a1a1a">
                <tspan x="500" dy="0">I lost this deal because</tspan>
                <tspan x="500" dy="50">I was afraid to ask one</tspan>
                <tspan x="500" dy="50">uncomfortable question.</tspan>
            </text>

            <!-- Key insight -->
            <rect x="500" y="330" width="670" height="120" fill="#FFF8F8" stroke="#DC3545" stroke-width="2" rx="6"/>
            <text x="530" y="365" font-size="18" font-weight="bold" fill="#DC3545">The reframe that changed my approach:</text>
            <text x="530" y="395" font-size="16" fill="#1a1a1a">"Being easy to work with is not a closing strategy.</text>
            <text x="530" y="420" font-size="16" fill="#1a1a1a">It's a coping mechanism." — Confident beats polite.</text>

            <!-- CTA -->
            <rect x="500" y="490" width="670" height="70" fill="#F8F8F8" stroke="#333" stroke-width="1" rx="4"/>
            <text x="520" y="520" font-size="18" font-weight="bold" fill="#DC3545">DM me "LOST DEAL"</text>
            <text x="520" y="545" font-size="14" fill="#1a1a1a">Share your story. Let's identify where you're pulling punches.</text>

            <!-- Website footer -->
            <text x="600" y="600" font-size="14" fill="#666" text-anchor="middle">barneslam.co/closing-confidence</text>
        </svg>
    </div>
</body>
</html>
