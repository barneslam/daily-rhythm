<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Proposal Without Meeting - LinkedIn Graphic</title>
    <style>
        body { margin: 0; padding: 20px; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        svg { background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: block; }
        h2 { margin: 20px 0 10px; color: #333; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Friday - barneslam.co (1200x628)</h2>
        <svg viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg" width="1200" height="628">
            <!-- Background -->
            <rect width="1200" height="628" fill="#ffffff"/>
            <rect width="1200" height="8" fill="#DC3545"/>

            <!-- Two columns: Before/After -->
            <!-- LEFT: The Old Way -->
            <rect x="50" y="100" width="500" height="450" fill="#F8F8F8" rx="8"/>
            <text x="300" y="140" font-size="22" font-weight="bold" fill="#666" text-anchor="middle">The Old Way</text>

            <!-- Proposal icon -->
            <rect x="150" y="180" width="300" height="180" fill="#E8E8E8" stroke="#999" stroke-width="2" rx="4"/>
            <text x="300" y="245" font-size="16" fill="#666" text-anchor="middle">📄 Proposal sent</text>
            <text x="300" y="270" font-size="14" fill="#999" text-anchor="middle">(hopes & prayers)</text>

            <!-- Ghost emoji -->
            <text x="300" y="360" font-size="48" text-anchor="middle">👻</text>
            <text x="300" y="400" font-size="14" fill="#DC3545" font-weight="bold" text-anchor="middle">73% of deals died here</text>

            <!-- Stat box -->
            <rect x="120" y="430" width="360" height="80" fill="#FFE6E6" stroke="#DC3545" stroke-width="2" rx="4"/>
            <text x="140" y="460" font-size="18" font-weight="bold" fill="#DC3545">No follow-up cadence</text>
            <text x="140" y="485" font-size="14" fill="#666">Just optimistic waiting</text>

            <!-- RIGHT: The New Way -->
            <rect x="650" y="100" width="500" height="450" fill="#F3F8F6" rx="8"/>
            <text x="900" y="140" font-size="22" font-weight="bold" fill="#1B4D3E" text-anchor="middle">The New Way</text>

            <!-- Meeting icon -->
            <circle cx="900" cy="240" r="50" fill="#1B4D3E" opacity="0.1"/>
            <text x="900" y="250" font-size="44" text-anchor="middle">📅</text>
            <text x="900" y="290" font-size="14" fill="#1B4D3E" font-weight="bold" text-anchor="middle">Book the meeting</text>
            <text x="900" y="310" font-size="13" fill="#666" text-anchor="middle">THEN send proposal</text>

            <!-- Check mark -->
            <circle cx="900" cy="380" r="30" fill="#1B4D3E" opacity="0.2"/>
            <text x="900" y="390" font-size="40" text-anchor="middle">✓</text>

            <!-- Stat box -->
            <rect x="720" y="430" width="360" height="80" fill="#E8F6F0" stroke="#1B4D3E" stroke-width="2" rx="4"/>
            <text x="740" y="460" font-size="18" font-weight="bold" fill="#1B4D3E">19% → 31% close rate</text>
            <text x="740" y="485" font-size="14" fill="#666">One $4M dev shop. One rule.</text>

            <!-- Arrow between columns -->
            <line x1="600" y1="314" x2="650" y2="314" stroke="#999" stroke-width="2" stroke-dasharray="5,5"/>

            <!-- Main stat headline -->
            <text x="600" y="560" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">
                Simple doesn't mean easy.
            </text>
            <text x="600" y="590" font-size="20" fill="#DC3545" font-weight="bold" text-anchor="middle">
                It means disciplined.
            </text>

            <!-- Website footer -->
            <text x="600" y="620" font-size="12" fill="#666" text-anchor="middle">barneslam.co/sales-rules — DM "RULES" for the full framework</text>
        </svg>
    </div>
</body>
</html>
