[build]
  command = "echo 'Dashboard ready for deployment'"
  publish = "."
  functions = "functions"
  environment = { SECRETS_SCAN_ENABLED = "false" }

[dev]
  command = "node dashboard-server.js"
  port = 3001

# Serve dashboard.html as the homepage
[[redirects]]
  from = "/"
  to = "/dashboard.html"
  status = 200
  force = true

# Serve approval dashboard
[[redirects]]
  from = "/approval"
  to = "/approval-dashboard.html"
  status = 200

[[redirects]]
  from = "/approval.html"
  to = "/approval-dashboard.html"
  status = 200

# Redirect all API calls to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Environment variables - Set in Netlify UI under Settings → Build & deploy → Environment
# SUPABASE_URL and SUPABASE_ANON_KEY must be configured in Netlify dashboard

# Scheduled Functions
[[scheduled_functions]]
  function = "publish-scheduler"
  # Every day at 09:00 UTC (Mon-Fri publishing window)
  cron = "0 9 * * *"

# Edge functions for real-time data
[functions]
  directory = "functions"
