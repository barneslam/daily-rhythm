[build]
publish = "."
functions = "netlify/functions"

# Scheduled functions
[[scheduled_functions]]
function = "schedule-discovery"
cron = "0 7 * * *"

[[scheduled_functions]]
function = "content-generator"
cron = "0 8 * * 1"

[[scheduled_functions]]
function = "content-publisher"
cron = "0 9 * * 1"

# API routing - redirect /api/* to Netlify functions
[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api-:splat"
status = 200

# Dashboard routing
[[redirects]]
from = "/"
to = "/dashboard.html"
status = 200

# Fallback for missing routes
[[redirects]]
from = "/*"
to = "/dashboard.html"
status = 200
