[build]
publish = "."
functions = "functions"

# Scheduled functions
[[scheduled_functions]]
function = "schedule-discovery"
cron = "0 7 * * *"

[[scheduled_functions]]
function = "content-generator"
cron = "0 16 * * 3"

# Publish today's approved drafts — weekdays at 2 PM UTC (9 AM EST)
[[scheduled_functions]]
function = "publish-scheduler"
cron = "0 14 * * 1-5"

# Blotato DM Polling - Every 30 minutes
[[scheduled_functions]]
function = "blotato-dm-poller"
cron = "*/30 * * * *"

# DM to Lead Converter - Every 60 minutes
[[scheduled_functions]]
function = "dm-to-lead-converter"
cron = "0 * * * *"

# Special test run - April 18 at 8 AM UTC
[[scheduled_functions]]
function = "test-full-pipeline"
cron = "0 8 18 4 *"

# API routing - redirect /api/* to Netlify functions
[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

# Dashboard routing
[[redirects]]
from = "/"
to = "/dashboard.html"
status = 200

# Fallback for missing routes
[[redirects]]
from = "/*"
to = "/dashboard.html"
status = 200
