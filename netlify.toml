[build]
  command = "echo 'GTM Engine Dashboard ready for deployment'"
  publish = "."
  functions = "functions"
  environment = { SECRETS_SCAN_ENABLED = "false" }

[dev]
  command = "node dashboard-server.js"
  port = 3001

# Redirect all API calls to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Redirect root to dashboard
[[redirects]]
  from = "/"
  to = "/dashboard.html"
  status = 200

# Environment variables - Set in Netlify UI under Settings → Build & deploy → Environment
# SUPABASE_URL, SUPABASE_ANON_KEY, BLOTATO_API_KEY, LINKEDIN_WEBHOOK_SECRET must be configured in Netlify dashboard

# Scheduled Functions
[[scheduled_functions]]
  function = "publish-scheduler"
  # Every weekday at 09:00 UTC
  cron = "0 9 * * 1-5"

[[scheduled_functions]]
  function = "content-curator"
  # Every Sunday at 03:00 UTC (Sunday 10pm EST)
  cron = "0 3 * * 0"

[[scheduled_functions]]
  function = "outreach-scheduler"
  # Every 30 minutes to process scheduled DM responses
  cron = "*/30 * * * *"

[[scheduled_functions]]
  function = "blotato-dm-poller"
  # Every 30 minutes to poll Blotato API for inbound LinkedIn DMs
  cron = "*/30 * * * *"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
