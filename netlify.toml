[build]
publish = "."
functions = "functions"

# Scheduled functions (all times in UTC for Netlify)
# Daily 10 AM EST = 15 UTC
[[scheduled_functions]]
function = "schedule-discovery"
cron = "0 15 * * *"

# Monday 8 AM EST = 13 UTC (Wednesdays for now, adjust as needed)
[[scheduled_functions]]
function = "content-generator"
cron = "0 13 * * 1"

# Sync carousel drafts to Supabase (Monday 8:01 AM EST = 13:01 UTC)
[[scheduled_functions]]
function = "sync-carousel-drafts"
cron = "1 13 * * 1"

# Publish weekdays at 9 AM EST = 2 PM UTC (correct)
[[scheduled_functions]]
function = "publish-scheduler"
cron = "0 14 * * 1-5"

# Sync RIN carousel drafts to RIN Supabase (Monday 8:00 AM EST = 13:00 UTC)
[[scheduled_functions]]
function = "sync-rin-carousel-drafts"
cron = "0 13 * * 1"

# Publish RIN carousels Mon-Sat at 9 AM EST = 14 UTC
[[scheduled_functions]]
function = "publish-rin-carousel"
cron = "0 14 * * 1-6"

# Publish Driver Pilot recruitment posts - Tuesday 9 AM EST = 14 UTC
[[scheduled_functions]]
function = "publish-driver-pilot-posts"
cron = "0 14 * * 2"

# Blotato DM Polling - Every 30 minutes
[[scheduled_functions]]
function = "blotato-dm-poller"
cron = "*/30 * * * *"

# DM to Lead Converter - Every 60 minutes
[[scheduled_functions]]
function = "dm-to-lead-converter"
cron = "0 * * * *"

# Publish Recovery Sprint daily posts - Daily at 9 AM EST = 14 UTC (Mon-Sun)
[[scheduled_functions]]
function = "publish-recovery-sprint"
cron = "0 14 * * *"

# Special test run - April 18 at 8 AM UTC
[[scheduled_functions]]
function = "test-full-pipeline"
cron = "0 8 18 4 *"

# Recovery Sprint landing page (must be before fallback)
[[redirects]]
from = "/recover"
to = "/recover.html"
status = 200
force = true

# API routing - explicit routes for delete/reject (must come before wildcard)
[[redirects]]
from = "/api/drafts/*/delete"
to = "/.netlify/functions/drafts"
status = 200

[[redirects]]
from = "/api/drafts/*/reject"
to = "/.netlify/functions/drafts"
status = 200

# Generic API routing - redirect /api/* to Netlify functions
[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

# Dashboard routing
[[redirects]]
from = "/"
to = "/dashboard.html"
status = 200

# Fallback for missing routes
[[redirects]]
from = "/*"
to = "/dashboard.html"
status = 200
